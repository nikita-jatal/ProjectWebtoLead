<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You | CardEdge</title>
  <style>
    body {
      font-family: 'Open Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f7f7f7;
    }
    .box {
      background: white;
      border-top: 4px solid #0b1f3a;
      padding: 50px 40px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .checkmark { font-size: 52px; margin-bottom: 16px; }
    h1 { font-size: 26px; color: #0b1f3a; margin-bottom: 10px; }
    p { font-size: 15px; color: #555; line-height: 1.7; margin-bottom: 8px; }
    .redirect-msg { font-size: 13px; color: #999; margin-bottom: 24px; }
    .redirect-msg span { font-weight: 700; color: #c9a84c; }
    a {
      display: inline-block;
      background: #0b1f3a;
      color: white;
      padding: 10px 28px;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 2px;
    }
    a:hover { background: #1a4f8a; }
    .progress {
      width: 100%;
      height: 3px;
      background: #eee;
      border-radius: 2px;
      margin-top: 24px;
      overflow: hidden;
    }
    .progress-fill {
      height: 3px;
      background: #c9a84c;
      border-radius: 2px;
      width: 100%;
      transition: width 1s linear;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="checkmark">✅</div>
    <h1>Thank You!</h1>
    <p>Your credit card application has been submitted successfully.<br>
    Our team at CardEdge will contact you shortly.</p>
    <p class="redirect-msg">Redirecting you back in <span id="secs">5</span> seconds...</p>
    <a href="https://nikita-jatal.github.io/ProjectWebtoLead/Projectwebtolead.html">Back to Website</a>
    <div class="progress"><div class="progress-fill" id="bar"></div></div>
  </div>

  <script>
    let s = 5;
    const el = document.getElementById('secs');
    const bar = document.getElementById('bar');
    const t = setInterval(() => {
      s--;
      el.textContent = s;
      bar.style.width = (s * 20) + '%';
      if (s <= 0) {
        clearInterval(t);
        window.location.href = 'https://nikita-jatal.github.io/ProjectWebtoLead/Projectwebtolead.html';
      }
    }, 1000);
  </script>
</body>
</html>
